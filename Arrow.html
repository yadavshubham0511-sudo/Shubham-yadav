<!DOCTYPE html>
<html>
    <body>
        <h1>Jaca Script Arrow Funtcion</h1>
        <p>This example is use to show Arrow Funtcion with parameter.</p>
        <p id="result"></p>
        <script>
            const add = (a,b) => a+b;

            document.getElementById("result").innerHTML = add(4,6)
        </script>
    </body>
</html>
